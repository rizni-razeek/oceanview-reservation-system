<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Ocean View Resort</title>
</head>
<body>
<h1>Ocean View Resort</h1>
<h2>Staff Login</h2>

<p id="msg" style="color:crimson;"></p>

<form method="post" action="login">
    <label for="username">Username</label><br/>
    <input id="username" name="username" required /><br/><br/>

    <label for="password">Password</label><br/>
    <input id="password" name="password" type="password" required /><br/><br/>

    <button type="submit">Login</button>
</form>

<script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    if (error === "1") document.getElementById("msg").textContent = "Invalid username or password.";
    if (error === "2") document.getElementById("msg").textContent = "Server error. Please try again.";
    if (error === "3") document.getElementById("msg").textContent = "Please log in to continue.";
</script>
</body>
</html>
