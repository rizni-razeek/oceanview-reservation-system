<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Calculate Bill</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Calculate and Print Bill</h1>

<p id="msg" style="color: crimson;"></p>

<form method="get" action="bill">
    <label for="reservationNo">Enter Reservation Number</label><br/>
    <input id="reservationNo" name="reservationNo" required><br/>
    <button type="submit">Generate Bill</button>
</form>

<p><a href="dashboard-static.html">Back to Dashboard</a></p>

<script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    if (error === "1") {
        document.getElementById("msg").textContent = "Please enter a reservation number.";
    }
    if (error === "2") {
        document.getElementById("msg").textContent = "Reservation not found.";
    }
</script>

</body>
</html>
